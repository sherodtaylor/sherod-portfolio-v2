name: website preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: github.event.action != 'closed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - name: Install + build
        if: github.event.action != 'closed'
        env:
          # PR_PREVIEW_BASE must include the umbrella-dir prefix because
          # rossjrw/pr-preview-action publishes to gh-pages:/pr-preview/pr-<N>/
          # — lesson learned from sherodtaylor/agent-smith#108. Astro's base
          # must match the live path exactly. Until DNS cuts over to
          # sherodtaylor.dev, we live under the github.io repo path
          # /sherod-portfolio-v2/ so the full preview base is
          # /sherod-portfolio-v2/pr-preview/pr-<N>/. Drop the repo prefix
          # when DNS swaps.
          PR_PREVIEW_BASE: /sherod-portfolio-v2/pr-preview/pr-${{ github.event.number }}/
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy preview to gh-pages/pr-<N>/
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Verify preview URL is reachable
        if: github.event.action != 'closed'
        run: |
          # Match the website.yml convention — github.io URL until DNS swap.
          # Bumped to 10 min (60 × 10s) because GH Pages occasionally takes
          # 5–8 min to expose a fresh gh-pages push for project sites; PR #28
          # hit the old 5-min ceiling cleanly (deploy succeeded, Pages was
          # still serving the prior tree).
          URL="${PREVIEW_HOST:-https://sherodtaylor.github.io/sherod-portfolio-v2}/pr-preview/pr-${{ github.event.number }}/"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}?cb=$(date +%s)")
            echo "[$i/60] ${URL} -> ${code}"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "ERROR: preview URL still not 200 after 10 minutes." >&2
          exit 1
