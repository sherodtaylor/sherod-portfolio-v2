name: website preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: github.event.action != 'closed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - name: Install + build
        if: github.event.action != 'closed'
        env:
          # PR_PREVIEW_BASE must include the umbrella-dir prefix because
          # rossjrw/pr-preview-action publishes to gh-pages:/pr-preview/pr-<N>/
          # — lesson learned from sherodtaylor/agent-smith#108. Astro's base
          # must match the live path exactly, otherwise CSS/JS resolve to a
          # wrong path and the preview ships unstyled.
          PR_PREVIEW_BASE: /pr-preview/pr-${{ github.event.number }}/
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy preview to gh-pages/pr-<N>/
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Verify preview URL is reachable
        if: github.event.action != 'closed'
        run: |
          URL="https://sherodtaylor.dev/pr-preview/pr-${{ github.event.number }}/"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}?cb=$(date +%s)")
            echo "[$i/30] ${URL} -> ${code}"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "ERROR: preview URL still not 200 after 5 minutes." >&2
          exit 1
