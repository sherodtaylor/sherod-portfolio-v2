projects:
  items:
    - name: "agent-smith"
      description: "Autonomous AI engineering teammates running in a home-lab Kubernetes cluster. Matrix is the input. Tag a bot, it opens a PR; tag another, it reviews. They never hold real credentials — those stay behind an egress proxy. Public Helm chart."
      highlights:
        - "Three agents, one image: DevBot (code), InfraBot (k3s/Flux), PMBot (product/PRDs) run as separate StatefulSets from the same parametric image. Per-agent persona is a directory under agents/<name>/"
        - "Matrix-driven PR workflow: messages in #dev / #infra are real Claude Code prompts. Author opens a PR; the other agent reviews and posts inline findings. A Stop-hook re-wakes the author on unaddressed comments — iteration without a human in the loop"
        - "Egress credential firewall (iron-proxy): agents never hold real GitHub or Anthropic tokens. iron-proxy MITMs egress and swaps placeholders for real creds per-host against an allowlist. A compromised pod leaks nothing useful"
        - "MCP for the cluster's own observability: VictoriaMetrics, VictoriaLogs, NATS, and the Matrix channel are all MCP servers. 'Check the api-latency dashboard' is one prompt"
        - "Public OSS: image at ghcr.io/sherodtaylor/agent-smith, Helm chart at oci://ghcr.io/sherodtaylor/charts/agent-smith"
      link:
        href: "https://github.com/sherodtaylor/agent-smith"
        label: "sherodtaylor/agent-smith"
        is_private: false
      website:
        href: "https://sherodtaylor.github.io/agent-smith"
        label: "Framework docs"
      icon: "Bot"
      tags: ["Claude Code", "MCP", "AI Agents", "Matrix", "NATS", "k3s", "Flux GitOps", "Helm", "iron-proxy", "Bun", "Go", "Docker", "tmux", "GitHub Actions"]
    - name: "SpareCoins"
      description: "A crypto investment mobile application that rounds up spare change from everyday transactions and automatically invests it in cryptocurrency. Think Acorns for crypto - democratizing crypto investing through micro-investing with seamless bank integration."
      highlights:
        - "Automated Crypto Investing: Connects to bank accounts to round up transaction spare change and automatically purchases cryptocurrency through Coinbase exchange integration"
        - "GraphQL-First Architecture: Built robust backend API using Golang, GraphQL, and Echo framework with OAuth authentication. Generated type-safe client code using GraphQL codegen for seamless frontend integration"
        - "Rich Mobile UX: Developed React Native frontend with Apollo GraphQL for data fetching. Created engaging user experience with custom Lottie animations for transaction flows, account linking, and investment progress visualization"
        - "Financial Integration: Implemented secure bank account connectivity using Plaid API for real-time transaction monitoring with automated round-up calculations and crypto purchase execution"
      link:
        href: "https://github.com/sherodtaylor/sparecoins"
        label: "sherodtaylor/sparecoins"
        is_private: true
      icon: "sparecoins"
      gif: "sparecoins.gif"
      demo:
        title: "SpareCoins Mobile Demo"
        description: "Interactive demonstration of the mobile application features and animations."
        preview_text: "View Live Demo"
        preview_subtitle: "Interactive mobile application showcase"
      tags: ["React Native", "Golang", "GraphQL", "Apollo", "Lottie", "OAuth", "Echo", "Plaid", "Coinbase API", "FinTech"]
    - name: "Home Lab Cluster"
      description: "Self-hosted k3s cluster running every app my family depends on. Flux reconciles from one git repo, ExternalSecrets pulls creds from Infisical, VictoriaMetrics + VictoriaLogs catch drift. Family-grade, GitOps-managed."
      highlights:
        - "Media + photos + files: Jellyfin, Plex, Immich (face-recognition over years of family photos), Nextcloud, Audiobookshelf — all running on the cluster, backed by TrueNAS NFS"
        - "Home Automation: Home Assistant — lights, thermostats, schedules, sensors — on the same cluster, not a separate appliance"
        - "Observability built-in: every pod's metrics and logs land in VictoriaMetrics / VictoriaLogs. Grafana + Alertmanager catch regressions before they become outages"
        - "GitOps all the way down: Flux reconciles every Kustomization and HelmRelease. cert-manager + kubernetes-replicator handle TLS. The cluster rebuilds from a single git push"
      link:
        href: "https://github.com/sherodtaylor/homelab"
        label: "sherodtaylor/homelab"
        is_private: false
      icon: "Server"
      gif: "homelab-dashboard.png"
      demo:
        title: "Home Lab Dashboard"
        description: "Live view of services running on the k3s cluster — media, photos, automation, observability, storage."
        preview_text: "View Dashboard"
        preview_subtitle: "Live service grid from the cluster"
      tags: ["Proxmox", "k3s", "Flux GitOps", "Helm", "Traefik", "cert-manager", "ExternalSecrets", "Infisical", "TrueNAS", "Home Assistant", "Jellyfin", "Plex", "Immich", "Nextcloud", "Audiobookshelf", "Sonarr", "Radarr", "Prowlarr", "qBittorrent", "VictoriaMetrics", "VictoriaLogs", "Grafana", "Alertmanager", "Let's Encrypt"]
    - name: "Dotfiles"
      description: "Maintained comprehensive dotfiles and development environment configurations for consistent, reproducible development setups across multiple systems."
      highlights:
        - "Cross-Platform Configuration: Unified development environment setup for macOS and Linux systems"
        - "Editor Configuration: Advanced Neovim configurations with language servers and productivity enhancements"
      link:
        href: "https://github.com/sherodtaylor/dotfiles"
        label: "sherodtaylor/dotfiles"
        is_private: false
      icon: "Settings"
      tags: ["Neovim", "Zsh", "Git", "Tmux", "Shell", "macOS", "Linux", "Docker"]

